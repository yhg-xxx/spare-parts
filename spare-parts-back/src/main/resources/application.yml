spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/parts2
    username: root
    password: 123456

  jpa:
    database-platform: org.hibernate.dialect.MySQL8InnoDBDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        connection:
          characterEncoding: utf8mb4
          useUnicode: true
          CharSet: utf8mb4

  servlet:
    multipart:
      max-file-size: 20MB     # 单个文件最大20MB
      max-request-size: 30MB  # 总请求最大30MB（需大于等于max-file-size）
      enabled: true
      file-size-threshold: 2MB

  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/
        - file:${app.upload.path}

  jackson:
    deserialization:
      accept_empty_array_as_null_object: true
    default-property-inclusion: non_null

app:
  upload:
    path: ${UPLOAD_DIR:./uploads}

server:
  port: 8080

amap:
  api-key: c0303816cca97cc7d7e7e2cb4da780af
  geocode-url: https://restapi.amap.com/v3/geocode/regeo

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
