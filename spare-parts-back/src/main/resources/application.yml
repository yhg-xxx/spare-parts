spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/spare parts
    username: root
    password: 123456

  jpa:
    database-platform: org.hibernate.dialect.MySQL8InnoDBDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
      enabled: true
      file-size-threshold: 2MB

  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/
        - file:${app.upload.path}  # ?????????

app:
  upload:
    path: ${UPLOAD_DIR:uploads}  # ???????????uploads???

server:
  port: 8080
