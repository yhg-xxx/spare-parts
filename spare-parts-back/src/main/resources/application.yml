spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/parts2
    username: root
    password: 123456

  jpa:
    database-platform: org.hibernate.dialect.MySQL8InnoDBDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        connection:
          characterEncoding: utf8mb4
          useUnicode: true
          CharSet: utf8mb4

  servlet:
    multipart:
      max-file-size: 20MB     # 单个文件最大20MB
      max-request-size: 30MB  # 总请求最大30MB（需大于等于max-file-size）
      enabled: true
      file-size-threshold: 2MB

  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/
        - file:${app.upload.path}

app:
  upload:
    path: ${UPLOAD_DIR:./uploads}

server:
  port: 8080