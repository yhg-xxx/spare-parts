spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/parts
    username: root
    password: 123456

  jpa:
    database-platform: org.hibernate.dialect.MySQL8InnoDBDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        connection:
          characterEncoding: utf8mb4
          useUnicode: true
          CharSet: utf8mb4

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
      enabled: true
      file-size-threshold: 2MB

  spring:
    web:
      resources:
        static-locations:
          - classpath:/static/
          - classpath:/public/
          - file:${app.upload.path}  # 确保路径变量正确解析
app:
  upload:
    path: ${UPLOAD_DIR:./uploads}  # 使用相对路径确保可移植性

server:
  port: 8080
